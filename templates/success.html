<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CryptoVault — Login Successful</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='styles.css') }}">
    <style>
        /* ── Success-specific styles ── */
        .success-icon {
            width: 72px;
            height: 72px;
            border-radius: 50%;
            background: rgba(34, 197, 94, 0.1);
            border: 2px solid rgba(34, 197, 94, 0.4);
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 22px;
            animation: popIn 0.5s cubic-bezier(0.22, 1, 0.36, 1) 0.15s both;
            box-shadow: 0 0 30px rgba(34, 197, 94, 0.2);
        }

        .success-icon svg {
            width: 34px;
            height: 34px;
            stroke: #22c55e;
            stroke-width: 2.5;
            fill: none;
            stroke-dasharray: 60;
            stroke-dashoffset: 60;
            animation: drawCheck 0.5s ease 0.4s forwards;
        }

        @keyframes drawCheck {
            to { stroke-dashoffset: 0; }
        }

        @keyframes popIn {
            from { opacity: 0; transform: scale(0.6); }
            to   { opacity: 1; transform: scale(1); }
        }

        .container h2 {
            margin-bottom: 4px;
        }

        .token-box {
            background: rgba(2, 6, 23, 0.8);
            border: 1px solid rgba(99, 102, 241, 0.2);
            border-radius: 10px;
            padding: 12px 16px;
            margin: 18px 0;
            font-family: 'Courier New', monospace;
            font-size: 0.78rem;
            color: #818cf8;
            word-break: break-all;
            text-align: left;
            position: relative;
        }

        .token-label {
            font-size: 0.68rem;
            font-weight: 600;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            color: #475569;
            margin-bottom: 4px;
            font-family: 'Inter', sans-serif;
        }

        .copy-btn {
            position: absolute;
            right: 10px;
            top: 50%;
            transform: translateY(-50%);
            background: rgba(99,102,241,0.15);
            border: 1px solid rgba(99,102,241,0.3);
            border-radius: 6px;
            padding: 4px 8px;
            color: #818cf8;
            font-size: 0.7rem;
            cursor: pointer;
            font-family: 'Inter', sans-serif;
            transition: background 0.2s;
        }
        .copy-btn:hover {
            background: rgba(99,102,241,0.3);
        }

        .features-row {
            display: flex;
            gap: 10px;
            margin: 14px 0;
            justify-content: center;
            flex-wrap: wrap;
        }

        .feature-chip {
            display: flex;
            align-items: center;
            gap: 5px;
            background: rgba(99,102,241,0.08);
            border: 1px solid rgba(99,102,241,0.15);
            border-radius: 8px;
            padding: 6px 11px;
            font-size: 0.76rem;
            color: #94a3b8;
        }

        .feature-chip span {
            font-size: 1rem;
        }
    </style>
</head>
<body>

<div class="container" id="successCard">

    <div class="success-icon">
        <svg viewBox="0 0 24 24">
            <polyline points="20 6 9 17 4 12"/>
        </svg>
    </div>

    <div class="badge" style="background:rgba(34,197,94,0.1); border-color:rgba(34,197,94,0.25); color:#4ade80;">
        ✓ Authentication Successful
    </div>

    <h2>Session Established</h2>
    <p class="subtitle">Welcome back. Your secure session is active.</p>

    <div class="divider"></div>

    <div class="features-row">
        <div class="feature-chip"><span>🔐</span> Bcrypt Auth</div>
        <div class="feature-chip"><span>🛡️</span> AES-256</div>
        <div class="feature-chip"><span>🔑</span> Session Token</div>
    </div>

    <div class="token-box">
        <div class="token-label">Session Token</div>
        <span id="tokenDisplay">Loading…</span>
        <button class="copy-btn" onclick="copyToken()">Copy</button>
    </div>

    <div style="display: flex; flex-direction: column; gap: 12px; margin-top: 20px;">
        
        <!-- Rapid File Transfer Section -->
        <div class="token-box" style="background:rgba(99,102,241,0.05); border-style:dashed; text-align:center;">
             <div class="token-label">Rapid File Transfer</div>
             <p style="font-size:0.75rem; color:#94a3b8; margin-bottom:12px;">Send an encrypted asset immediately</p>
             <input type="file" id="quickVaultFile" style="display:none;" onchange="quickUpload()">
             <button class="btn-secondary" onclick="document.getElementById('quickVaultFile').click()" style="width:100%; font-size:0.75rem; padding:8px;">
                Choose File to Vault 🛡️
             </button>
        </div>

        <button class="btn-primary" onclick="window.location.href='/dashboard'" style="margin:0; background:linear-gradient(135deg,#059669,#10b981); box-shadow:0 4px 20px rgba(16,185,129,0.3);">
            Go to Full Dashboard →
        </button>
        
        <button class="btn-secondary" onclick="downloadReport()" style="width:100%; justify-content:center; border-color:rgba(16,185,129,0.3); color:#4ade80;">
            <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24" style="margin-right:8px;">
                <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/>
            </svg>
            Download Signed Report
        </button>

        <button class="btn-secondary" onclick="logout()" style="width:100%; justify-content:center; opacity:0.6;">
            <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24" style="margin-right:8px;">
                <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/>
            </svg>
            Logout session
        </button>
    </div>

</div>

<script>
    const token = localStorage.getItem("session_token");
    if (token) {
        document.getElementById("tokenDisplay").textContent = token;
    } else {
        document.getElementById("tokenDisplay").textContent = "No active session";
    }

    function copyToken() {
        const token = localStorage.getItem("session_token") || "";
        navigator.clipboard.writeText(token).then(() => {
            const btn = document.querySelector(".copy-btn");
            btn.textContent = "Copied!";
            setTimeout(() => btn.textContent = "Copy", 1500);
        });
    }

    async function downloadReport() {
        try {
            const res = await fetch("/generate_report");
            const data = await res.json();
            
            const blob = new Blob([data.file_content], { type: 'text/plain' });
            const url = window.URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.style.display = 'none';
            a.href = url;
            a.download = 'CryptoVault_Secure_Report.txt';
            document.body.appendChild(a);
            a.click();
            window.URL.revokeObjectURL(url);
        } catch (e) {
            alert("Error generating report: " + e.message);
        }
    }

    async function quickUpload() {
        const fileInput = document.getElementById("quickVaultFile");
        if (!fileInput.files[0]) return;

        const formData = new FormData();
        formData.append("file", fileInput.files[0]);

        try {
            const res = await fetch("/vault/send", {
                method: "POST",
                body: formData
            });

            const result = await res.json();
            if (result.filename) {
                alert("Success! File encrypted and sent to the Vault.");
                window.location.href = "/dashboard";
            }
        } catch (e) {
            alert("Transfer failed: " + e.message);
        }
    }

    function logout() {
        localStorage.removeItem("session_token");
        window.location.href = "/";
    }
</script>
</body>
</html>
