<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CryptoVault — Login</title>
    <meta name="description" content="Secure access portal with end-to-end encrypted login.">
    <link rel="stylesheet" href="{{ url_for('static', filename='styles.css') }}">
    <style>
        .title-wrapper {
            text-align: center;
            margin-bottom: 20px;
            animation: fadeInDown 0.8s cubic-bezier(0.22, 1, 0.36, 1) forwards;
        }

        .animated-title {
            font-size: 2.2rem;
            font-weight: 800;
            margin: 0 0 5px 0;
            background: linear-gradient(135deg, #a78bfa, #6366f1, #38bdf8);
            background-size: 200% auto;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: gradientShine 4s linear infinite;
        }

        @keyframes gradientShine {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        @keyframes fadeInDown {
            from { opacity: 0; transform: translateY(-15px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        .sub-title-small {
            font-size: 0.9rem;
            color: #94a3b8;
            margin: 0;
            letter-spacing: 0.5px;
        }
    </style>
</head>
<body>

<div class="container" role="main">

    <!-- Shield Logo -->
    <div class="logo" aria-hidden="true">
        <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
            <path d="M12 2L4 6v6c0 5.25 3.5 10.15 8 11.35C16.5 22.15 20 17.25 20 12V6L12 2z"/>
        </svg>
    </div>

    <div class="badge">
        <svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
            <circle cx="12" cy="12" r="10"/><path d="M12 8v4l3 3"/>
        </svg>
        Encrypted Session
    </div>

    <div class="title-wrapper">
        <h1 class="animated-title">CryptoVault</h1>
        <p class="sub-title-small">Secure Access Authentication</p>
    </div>

    <div class="divider"></div>

    <!-- Username -->
    <div class="input-group">
        <label for="username">Username</label>
        <input
            type="text"
            id="username"
            placeholder="Enter username"
            autocomplete="username"
            spellcheck="false"
        >
    </div>

    <!-- Password -->
    <div class="input-group">
        <label for="password">Password</label>
        <div class="password-wrapper">
            <input
                type="password"
                id="password"
                placeholder="Enter password"
                autocomplete="current-password"
            >
            <span class="eye" onclick="togglePassword()" aria-label="Toggle password visibility">
                <svg id="eyeIcon" xmlns="http://www.w3.org/2000/svg" width="18" height="18"
                     fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                    <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
                    <circle cx="12" cy="12" r="3"/>
                </svg>
            </span>
        </div>
    </div>

    <div id="errorMsg" role="alert" aria-live="polite"></div>

    <button id="loginBtn" class="btn-primary" onclick="secureLogin()">
        Sign In
    </button>

    <!-- Security indicators -->
    <div class="security-row">
        <span class="security-tag">
            <svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                <rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/>
            </svg>
            AES-256
        </span>
        <span class="security-tag">
            <svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                <circle cx="12" cy="12" r="10"/><path d="M12 8v4l3 3"/>
            </svg>
            Session Tokens
        </span>
        <span class="security-tag">
            <svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                <path d="M12 2L4 6v6c0 5.25 3.5 10.15 8 11.35C16.5 22.15 20 17.25 20 12V6L12 2z"/>
            </svg>
            Bcrypt
        </span>
    </div>

</div>

<script src="{{ url_for('static', filename='main.js') }}"></script>
</body>
</html>
